services:
  postgres:
    image: postgres:16-alpine
    container_name: mlb-stat-explorer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mlb_stat_explorer
      POSTGRES_USER: mlb
      POSTGRES_PASSWORD: mlb
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlb -d mlb_stat_explorer"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
